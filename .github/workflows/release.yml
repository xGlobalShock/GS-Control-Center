name: Build & Release

# ──────────────────────────────────────────────────────────────
# Builds the Electron app on the PRIVATE repo and publishes
# release artifacts to the PUBLIC repo (GS-Center-Releases).
#
# Prerequisites:
#   1. Create repo: xGlobalShock/GS-Center-Releases (public)
#   2. Create a GitHub PAT with 'repo' scope
#   3. Add it as a secret named PUBLIC_REPO_TOKEN on this repo
# ──────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Mark as pre-release?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

jobs:
  # ── Step 1: Extract version & generate release notes ──
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_name: ${{ steps.version.outputs.tag_name }}
      release_notes: ${{ steps.release_notes.outputs.notes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=v$VERSION" >> $GITHUB_OUTPUT

      - name: Create tag on private repo (if missing)
        run: |
          TAG="${{ steps.version.outputs.tag_name }}"
          if ! git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            git tag "$TAG"
            git push origin "$TAG"
            echo "Created tag $TAG"
          else
            echo "Tag $TAG already exists"
          fi

      - name: Generate release notes
        id: release_notes
        run: |
          TAG="${{ steps.version.outputs.tag_name }}"
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            COMMIT_LOG=$(git log --oneline "$TAG" | head -20 | sed 's/^/- /')
          else
            COMMIT_LOG=$(git log --oneline "$PREVIOUS_TAG".."$TAG" | sed 's/^/- /')
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
          echo "notes<<$EOF" >> $GITHUB_OUTPUT
          echo "## GS Center ${{ steps.version.outputs.version }}" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### Changes" >> $GITHUB_OUTPUT
          echo "$COMMIT_LOG" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "---" >> $GITHUB_OUTPUT
          echo "📥 **Download:** \`GS-Center-Setup-${{ steps.version.outputs.version }}.exe\`" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

  # ── Step 2: Build on Windows ──
  build:
    needs: prepare
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build native hardware monitor
        run: npm run build:monitor

      - name: Build React app
        env:
          CI: false
          GENERATE_SOURCEMAP: false
        run: npm run react-build

      - name: Build Electron installer
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --win --x64 --publish never

      - name: List dist output
        run: Get-ChildItem -Recurse dist/ | Select-Object FullName
        shell: pwsh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            dist/GS-Center-Setup-*.exe
            dist/latest.yml
            dist/*.blockmap
          retention-days: 1

  # ── Step 3: Publish to PUBLIC repo ──
  publish:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: dist/

      - name: List artifacts
        run: ls -la dist/

      - name: Create release on public repo
        uses: softprops/action-gh-release@v2
        with:
          repository: xGlobalShock/GS-Center-Releases
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          name: GS Center ${{ needs.prepare.outputs.version }}
          body: ${{ needs.prepare.outputs.release_notes }}
          draft: false
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          files: dist/*
